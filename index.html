<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividades</title>

    <!-- FONTE ESTILO SENAC -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- SEU CSS -->
    <link rel="stylesheet" href="Atividade.css">
</head>
<body>

<div class="container">
    <h1>Menu de Atividades</h1>

    <div class="grid">

<button class="btn" onclick="atividade1()">Atividade 1<span class="tooltip">Cadastrar alunos e listar numerado</span></button>
<button class="btn" onclick="atividade2()">Atividade 2<span class="tooltip">Cadastrar e listar idades</span></button>
<button class="btn" onclick="atividade3()">Atividade 3<span class="tooltip">Lista de alunos + quantidade</span></button>
<button class="btn" onclick="atividade4()">Atividade 4<span class="tooltip">Verificar maior ou menor de idade</span></button>
<button class="btn" onclick="atividade5()">Atividade 5<span class="tooltip">Verificar aprovação por nota</span></button>
<button class="btn" onclick="atividade6()">Atividade 6<span class="tooltip">Sistema simples de cadastro</span></button>
<button class="btn" onclick="atividade7()">Atividade 7<span class="tooltip">Listar produtos fixos</span></button>
<button class="btn" onclick="atividade8()">Atividade 8<span class="tooltip">Contar alunos cadastrados</span></button>
<button class="btn" onclick="atividade9()">Atividade 9<span class="tooltip">Somar números digitados</span></button>
<button class="btn" onclick="atividade10()">Atividade 10<span class="tooltip">Calcular média de notas</span></button>
<button class="btn" onclick="atividade11()">Atividade 11<span class="tooltip">Média + aprovado/reprovado</span></button>
<button class="btn" onclick="atividade12()">Atividade 12<span class="tooltip">Listar nomes numerados</span></button>
<button class="btn" onclick="atividade13()">Atividade 13<span class="tooltip">Filtrar maiores de idade</span></button>
<button class="btn" onclick="atividade14()">Atividade 14<span class="tooltip">Identificar tipo de usuário</span></button>
<button class="btn" onclick="atividade15()">Atividade 15<span class="tooltip">Adicionar nomes em lista</span></button>
<button class="btn" onclick="atividade16()">Atividade 16<span class="tooltip">Contar aprovados</span></button>
<button class="btn" onclick="atividade17()">Atividade 17<span class="tooltip">Menu interativo de itens</span></button>
<button class="btn" onclick="atividade18()">Atividade 18<span class="tooltip">Cadastrar pessoas click no F12 para abrir o console (objeto)</span></button>
<button class="btn" onclick="atividade19()">Atividade 19<span class="tooltip">Buscar nome na lista</span></button>
<button class="btn" onclick="atividade20()">Atividade 20<span class="tooltip">Sistema com média de alunos</span></button>

    </div>
</div>

<script>

//  ATIVIDADE 1
function atividade1() {
    let alunos = [];

    for (let i = 0; i < 3; i++) {
        let nome = prompt("Digite o nome do aluno:");
        alunos.push(nome);
    }

    let lista = "";

    for (let i = 0; i < alunos.length; i++) {
        lista += (i + 1) + " - " + alunos[i] + "\n";
    }

    alert("Alunos cadastrados:\n\n" + lista);
}

// ATIVIDADE 2
function atividade2() {
    let idades = [];

    for (let i = 0; i < 5; i++) {
        let idade = Number(prompt("Digite a idade:"));
        idades.push(idade);
    }

    let lista = "";

    for (let i = 0; i < idades.length; i++) {
        lista += idades[i] + "\n";
    }

    alert("Idades cadastradas:\n\n" + lista);
}

// ATIVIDADE 3
function atividade3() {
    let listaAlunos = [];

    for (let i = 0; i < 5; i++) {
        let nome = prompt("Digite o nome:");
        listaAlunos.push(nome);
    }

    alert(
        "Alunos:\n" +
        listaAlunos.join("\n") +
        "\n\nQuantidade: " + listaAlunos.length
    );
}

// ATIVIDADE 4
function atividade4() {
    let idade = Number(prompt("Digite sua idade:"));

    if (idade >= 18) {
        alert("Maior de idade");
    } else {
        alert("Menor de idade");
    }
}

// ATIVIDADE 5
function atividade5() {
    let nota = Number(prompt("Digite a nota:"));

    if (nota >= 7) {
        alert("Aprovado");
    } else {
        alert("Reprovado");
    }
}

// ATIVIDADE 6
let alunos = [];

function atividade6() {
    let opcao;

    do {
        opcao = Number(prompt("1 - Cadastrar\n2 - Listar\n3 - Sair"));

        switch (opcao) {
            case 1:
                let nome = prompt("Nome:");
                alunos.push(nome);
                break;

            case 2:
                alert(alunos.join(", "));
                break;

            case 3:
                alert("Saindo...");
                break;
        }

    } while (opcao !== 3);
}

// ATIVIDADE 7
function atividade7() {
    let produtos = ["Coca Cola", "Carne", "Pipoca"];
    alert(produtos.join(", "));
}

// ATIVIDADE 8
function atividade8() {
    let listaAlunos = [];

    for (let i = 0; i < 5; i++) {
        let nome = prompt("Nome:");
        listaAlunos.push(nome);
    }

    alert("Quantidade: " + listaAlunos.length);
}

// ATIVIDADE 9
function atividade9() {
    let numeros = [];
    let soma = 0;

    for (let i = 0; i < 5; i++) {
        numeros.push(Number(prompt("Digite um número:")));
    }

    for (let i = 0; i < numeros.length; i++) {
        soma += numeros[i];
    }

    alert("Soma: " + soma);
}

// ATIVIDADE 10
function atividade10() {
    let notas = [];
    let soma = 0;

    for (let i = 0; i < 3; i++) {
        notas.push(Number(prompt("Digite a nota:")));
    }

    for (let i = 0; i < notas.length; i++) {
        soma += notas[i];
    }

    let media = soma / notas.length;

    alert("Média: " + media.toFixed(2));
}

// ATIVIDADE 11
function atividade11() {
    let notas = [];
    let soma = 0;

    for (let i = 0; i < 3; i++) {
        notas.push(Number(prompt("Digite a nota:")));
    }

    for (let i = 0; i < notas.length; i++) {
        soma += notas[i];
    }

    let media = soma / notas.length;

    if (media >= 7) {
        alert("Aprovado: " + media.toFixed(2));
    } else {
        alert("Reprovado: " + media.toFixed(2));
    }
}

// ATIVIDADE 12
function atividade12() {
    let nomes = [];

    for (let i = 0; i < 5; i++) {
        nomes.push(prompt("Nome:"));
    }

    let lista = "";
    for (let i = 0; i < nomes.length; i++) {
        lista += (i + 1) + ". " + nomes[i] + "\n";
    }

    alert(lista);
}

// ATIVIDADE 13
function atividade13() {
    let idades = [];
    let maiores = [];

    for (let i = 0; i < 5; i++) {
        idades.push(Number(prompt("Idade:")));
    }

    for (let i = 0; i < idades.length; i++) {
        if (idades[i] >= 18) {
            maiores.push(idades[i]);
        }
    }

    alert(maiores.join(", "));
}

// ATIVIDADE 14
function atividade14() {
    let cargo = prompt("A ou U").toUpperCase();

    switch (cargo) {
        case "A":
            alert("Admin");
            break;
        case "U":
            alert("Usuário");
            break;
        default:
            alert("Inválido");
    }
}

// ATIVIDADE 15
let listaNomes = [];

function atividade15() {
    listaNomes.push(prompt("Nome:"));
    alert(listaNomes.join(", "));
}

// ATIVIDADE 16
function atividade16() {
    let notas = [];
    let aprovados = 0;

    for (let i = 0; i < 5; i++) {
        let nota = Number(prompt("Nota:"));
        notas.push(nota);

        if (nota >= 7) {
            aprovados++;
        }
    }

    alert("Aprovados: " + aprovados);
}

// ATIVIDADE 17
function atividade17() {
    let itens = [];
    let opcao;

    do {
        opcao = Number(prompt("1-Add 2-List 3-Sair"));

        if (opcao === 1) {
            itens.push(prompt("Item:"));
        } else if (opcao === 2) {
            alert(itens.join(", "));
        }

    } while (opcao !== 3);
}

// ATIVIDADE 18

function atividade18() {
let nomesAtividade18 = ['Marcos','Carlos','Richard','Vinicius','João']
    let idadesAtividade18 = [22,33,19,22,28]
 
    let dados = []
 
    for (let i = 0; i < 5; i++){
        dados.push({
            nome: nomesAtividade18[i],
            idade: idadesAtividade18[i]
        })
    }
    console.table(dados);
}
// ATIVIDADE 19
function atividade19() {
    let nomes = ["Ana", "Carlos", "João", "Maria"];

    let lista = "Nomes disponíveis:\n";
    for (let i = 0; i < nomes.length; i++) {
        lista += (i + 1) + " - " + nomes[i] + "\n";
    }

    alert(lista);

    let busca = prompt("Digite um nome para buscar:");

    let encontrado = false;

    for (let i = 0; i < nomes.length; i++) {
        if (nomes[i].toLowerCase() === busca.toLowerCase()) {
            encontrado = true;
            break;
        }
    }

    if (encontrado) {
        alert("Nome encontrado na lista!");
    } else {
        alert("Nome não encontrado.");
    }
}
// ATIVIDADE 20
function atividade20() {
    let alunos = [];
    let opcao;

    do {
        opcao = Number(prompt("1-Cadastrar 2-Listar 3-Média 4-Sair"));

        if (opcao === 1) {
            alunos.push({
                nome: prompt("Nome"),
                nota: Number(prompt("Nota"))
            });
        }

        if (opcao === 2) {
            console.table(alunos);
        }

        if (opcao === 3) {
            let soma = 0;

            for (let i = 0; i < alunos.length; i++) {
                soma += alunos[i].nota;
            }

            let media = alunos.length ? soma / alunos.length : 0;

            alert(media.toFixed(2));
        }

    } while (opcao !== 4);
}

</script>

</body>
</html>
